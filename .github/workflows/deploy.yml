name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy if CI passes (optional — remove `needs` if you don't want to wait)
    needs: []

    steps:
      - name: Deploy to Vultr VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export RAILS_ENV=production
            export RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            export DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            export DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}

            cd /opt/soul_link
            git pull origin main
            ~/.rbenv/shims/bundle install --without development test
            ~/.rbenv/shims/ruby bin/rails db:migrate
            ~/.rbenv/shims/ruby bin/rails assets:precompile
            systemctl restart soul-link-bot
            systemctl restart soul-link-web || true
