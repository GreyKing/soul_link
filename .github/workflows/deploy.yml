name: Test & Deploy

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: soul_link_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '.ruby-version'
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: test
          DATABASE_HOST: 127.0.0.1
        run: bin/rails db:schema:load

      - name: Precompile assets
        env:
          RAILS_ENV: test
        run: bin/rails assets:precompile

      - name: Run tests
        env:
          RAILS_ENV: test
          DATABASE_HOST: 127.0.0.1
        run: bin/rails test

  deploy:
    runs-on: ubuntu-latest
    needs: [ test ]

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export RAILS_ENV=production
            export RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}
            export DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            export DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            export SOUL_LINK_HOST=4luckyclovers.com

            cd /opt/soul_link
            git pull origin main
            ~/.rbenv/shims/bundle install --without development test
            ~/.rbenv/shims/ruby bin/rails db:migrate
            ~/.rbenv/shims/ruby bin/rails assets:precompile

            # Write environment file from secrets (not stored in repo)
            mkdir -p /etc/soul_link
            printf '%s\n' "RAILS_ENV=production" "RAILS_MASTER_KEY=${RAILS_MASTER_KEY}" "DATABASE_USERNAME=${DATABASE_USERNAME}" "DATABASE_PASSWORD=${DATABASE_PASSWORD}" "SOUL_LINK_HOST=${SOUL_LINK_HOST}" > /etc/soul_link/env
            chmod 600 /etc/soul_link/env

            # Install/update systemd units from repo
            cp config/deploy/soul-link-web.service /etc/systemd/system/
            cp config/deploy/soul-link-bot.service /etc/systemd/system/
            cp config/deploy/systemd-failure-notify@.service /etc/systemd/system/
            mkdir -p /etc/systemd/system/nginx.service.d
            cp config/deploy/nginx-override.conf /etc/systemd/system/nginx.service.d/override.conf
            cp config/deploy/notify-failure.sh /usr/local/bin/notify-failure
            chmod +x /usr/local/bin/notify-failure
            systemctl daemon-reload

            # Reload nginx if running, restart if failed (safe — certbot manages the main config)
            nginx -t && systemctl reload-or-restart nginx

            systemctl restart soul-link-bot
            systemctl restart soul-link-web
