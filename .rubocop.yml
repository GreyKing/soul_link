# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

# Attempting to exclude the binary directory from linting
AllCops:
  Exclude:
  - 'bin/**/*'

Style/StringLiterals:
  Enabled: false

Layout/TrailingEmptyLines:
  Enabled: false

# `db/schema.rb` is regenerated by Rails on every db:migrate; the
# dumper produces tight `["x"]` arrays which trip the omakase
# bracket-spacing preference. Skip the file for this cop.
Layout/SpaceInsideArrayLiteralBrackets:
  Exclude:
  - 'db/schema.rb'