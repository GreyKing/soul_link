# Soul Link — nginx location blocks
# Auto-synced by deploy pipeline. Safe to update via git push.
# Include this file inside your server block(s):
#   include /opt/soul_link/config/deploy/nginx-locations.conf;

# Serve static assets directly
location /assets/ {
  expires max;
  add_header Cache-Control "public, immutable";
  gzip_static on;
}

# ActionCable WebSocket — upgrade connection
location /cable {
  proxy_pass http://soul_link_puma;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
}

# Proxy everything else to Puma
location / {
  proxy_pass http://soul_link_puma;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_redirect off;
}
