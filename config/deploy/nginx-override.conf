# /etc/systemd/system/nginx.service.d/override.conf
# Adds auto-restart and failure notification to the stock nginx unit.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/nginx.service.d
#   sudo cp config/deploy/nginx-override.conf /etc/systemd/system/nginx.service.d/override.conf
#   sudo systemctl daemon-reload

[Unit]
OnFailure=systemd-failure-notify@%n.service

[Service]
Restart=on-failure
RestartSec=5
