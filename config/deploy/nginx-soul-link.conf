# /etc/nginx/sites-available/soul-link
# Nginx reverse proxy for Soul Link Team Builder
#
# Install:
#   sudo cp config/deploy/nginx-soul-link.conf /etc/nginx/sites-available/soul-link
#   sudo ln -s /etc/nginx/sites-available/soul-link /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after nginx is running):
#   sudo certbot --nginx -d YOUR_DOMAIN.com

upstream soul_link_puma {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name 4luckyclovers.com;

  # Certbot will add SSL config here after running:
  # sudo certbot --nginx -d 4luckyclovers.com

  root /opt/soul_link/public;

  # Serve static assets directly
  location /assets/ {
    expires max;
    add_header Cache-Control "public, immutable";
    gzip_static on;
  }

  # ActionCable WebSocket — upgrade connection
  location /cable {
    proxy_pass http://soul_link_puma;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Proxy everything else to Puma
  location / {
    proxy_pass http://soul_link_puma;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
  }
}
