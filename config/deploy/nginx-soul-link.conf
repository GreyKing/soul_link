# /etc/nginx/sites-available/soul-link
# Nginx reverse proxy for Soul Link Team Builder
#
# IMPORTANT: This file is a reference template for initial setup only.
# It is NOT auto-synced by the deploy pipeline (certbot modifies it for SSL).
# Location blocks are auto-synced via nginx-locations.conf instead.
#
# Initial setup:
#   sudo cp config/deploy/nginx-soul-link.conf /etc/nginx/sites-available/soul-link
#   sudo ln -s /etc/nginx/sites-available/soul-link /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (after nginx is running):
#   sudo certbot --nginx -d 4luckyclovers.com
#
# After certbot runs, add this line inside BOTH server blocks (80 and 443):
#   include /opt/soul_link/config/deploy/nginx-locations.conf;
# Then remove the inline location blocks that this template created.

upstream soul_link_puma {
  server 127.0.0.1:3000;
}

server {
  listen 80;
  server_name 4luckyclovers.com;

  root /opt/soul_link/public;

  include /opt/soul_link/config/deploy/nginx-locations.conf;
}
