# config/soul_link/gym_info.yml
#
# Pokémon Platinum gym data. `max_level` is the Soul Link Nuzlocke level
# cap for facing that gym — by convention, it equals that gym leader's
# ace Pokémon level. Confirmed against pret/pokeplatinum trainer data on
# 2026-05-02; values are Platinum-specific (BDSP and DP differ at gyms
# 6 / 7 — see handoff/2026-05-02-yml-and-sram-expansion.md).
#
# Names match the in-game gym signs (e.g. "Eterna Gym", not "Eterna City
# Gym"). Consumed via SoulLink::GameState.gym_info and rendered as
# "Level Cap: <max_level>" in dashboard / map / gym_ready views.
first_gym:
  name: "Oreburgh Gym"
  max_level: 14
  location: oreburgh_city
  number: 1
  leader: "Roark"
  type: "Rock"
  ace: "Cranidos"

