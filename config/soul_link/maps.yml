# config/soul_link/maps.yml
#
# Pokémon Platinum map header IDs → human-readable names.
# Loaded by SoulLink::GameState.map_name(id); rendered via
# EmulatorHelper#format_map_name in run-roster + slot-card surfaces.
#
# Source: pret/pokeplatinum disassembly (`include/constants/map.h`)
# header IDs in canonical Sinnoh region order. **The integer IDs in
# this file are best-effort and have NOT been validated against a
# real `.sav`** — the parser's MAP_ID_OFFSET = 0x1234 is also
# unvalidated (see BUILD-LOG Known Gap KG-7). Both validations
# should happen together when a real save is available. Until then,
# unknown IDs surface as "Map #N" via the helper's fallback, which
# is informative enough for v1 and signals which entries need to be
# added or corrected.
#
# Format: integer ID → { name: "Display Name" }. The hash shape
# leaves room for future fields (e.g. region:, dungeon: bool)
# without breaking the API.

