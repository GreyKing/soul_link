# config/soul_link/met_locations.yml
#
# Pokemon Platinum **met-location** IDs → human-readable names.
#
# **Different enum from `maps.yml`.** maps.yml maps **map-header IDs**
# (where am I right now? — the SRAM trainer block field). This file
# maps **met-location IDs** (where was this Pokemon encountered? — the
# per-PKM Block-B `MetLocation_PtHGSS` u16 at decrypted record offset
# `0x46-0x47`). Different table, different IDs. They overlap in name
# but not in numeric value.
#
# Sources (closes KG-12):
# - PKHeX `PKHeX.Core/Resources/text/locations/gen4/text_hgss_00000_en.txt`
#   — 235 entries, 0-indexed. The first 127 entries (IDs 0..126) are
#   the Sinnoh / Platinum-relevant met-locations. IDs 127..234 are
#   Johto/Kanto/HGSS — out of scope for a Platinum-only Soul Link run
#   but documented inline in case a Pokemon traded in from HGSS lands
#   in a player's party.
# - PKHeX `PKHeX.Core/Game/Locations/Locations.cs` — special met-IDs:
#     * 2000 = Daycare4         (egg, hatched at daycare)
#     * 2001 = LinkTrade4NPC    (in-game trade with an NPC)
#     * 2002 = LinkTrade4       (link trade with another player)
#     * 3001 = Ranger4          (event Pokemon from Pokemon Ranger)
#     * 3002 = Faraway4         (mystery gift / distant land sentinel)
#   These five all carry `event: true` so `CatchCoordinator` flags
#   them with `acquired_via: 'event_gift'` rather than dropping the
#   row. Players can still see the catch landed but it's clearly
#   marked as not-a-Soul-Link-encounter.
# - pret/pokeplatinum `res/text/special_met_location_names.json`
#   confirms the same special-ID set (Daycare, Link trade, Distant
#   land, Mystery Zone, Ranger, etc.) under different numeric IDs
#   that PKHeX reads from the in-game text-table file — PKHeX's
#   numbers are the canonical PKM-record values; pret's are the
#   internal text-table indices. We use PKHeX's, which are what the
#   actual `MetLocation_PtHGSS` field in a saved PKM contains.
#
# Format: integer ID → { name: "Display Name" [, event: true] }.
# Hash shape leaves room for future fields (region:, dungeon:) without
# breaking the API. Missing IDs surface as "Met-Location #N" via the
# `EmulatorHelper#format_map_name`-shaped fallback in the helper.
#
# Coverage v1: every Platinum route 201-230, every gym town, every
# notable dungeon, plus the five special pseudo-IDs. Total ~127 entries.

# ── 0: Mystery Zone (sentinel — uninitialized PKM, treated as event) ──
0:    { name: "Mystery Zone", event: true }

