# config/soul_link/settings.yml
# General bot settings

# Category naming: controls how Discord categories are named for each run.
# The run number is appended automatically.
# Examples: "Platinum Run" → "Platinum Run 1", "Run #" → "Run #1"
category_prefix: "Platinum Run"

# Players: the 4 Soul Link participants. Used for species tracking per group.
# discord_user_id: right-click your username in Discord > Copy User ID
# display_name: shown in panel embeds next to each player's species
players:
  - discord_user_id: 153665622641737728
    display_name: "Grey"
